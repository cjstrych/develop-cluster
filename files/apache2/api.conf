RewriteEngine on
RewriteRule ^/(api)/(.*)$ https://%{SERVER_NAME}/$1/$2 [R,L]
RewriteRule ^/(api)$ https://%{SERVER_NAME}/$1/ [R,L]

ProxyPreserveHost On
ProxyRequests Off
SSLProxyEngine on
SSLProxyVerify none
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyCheckPeerExpire off
ProxyPass /api/ https://127.0.0.1:8081/api/
ProxyPassReverse /api/ https://127.0.0.1:8081/api/
ProxyPass /json https://127.0.0.1:8081/json
ProxyPassReverse /json https://127.0.0.1:8081/json
ProxyPass /shell https://127.0.0.1:8081/shell
ProxyPassReverse /shell https://127.0.0.1:8081/shell
